# Simple Blog 配置
title: "BxYZ Blog"
description: "爱吾所爱，一生自在"
author: "BXYZ"
url: "https://bxyz.blog"  # TODO: 替换为实际部署域名
posts_per_page: 10

# 文章源目录配置（对接 markdown-press）
posts_source: "../posts"  # 相对于 simple-blog 目录的文章源路径

# 社交链接
social:
  github: ""
  twitter: ""
  email: ""

# 网站设置
footer: "© 2026 BxYZ Blog. All rights reserved."

# Giscus 评论配置
# 使用前先在 https://giscus.app 为目标仓库安装 GitHub App，
# 然后填入 repo、repo_id、category、category_id。
giscus:
  enabled: true
  repo: "Yunz93/bxyz-blog-storage"
  repo_id: "R_kgDOR5V5AA"
  category: "Announcements"
  category_id: "DIC_kwDOR5V5AM4C6AYG"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "top"
  theme: "preferred_color_scheme"
  lang: "zh-CN"
